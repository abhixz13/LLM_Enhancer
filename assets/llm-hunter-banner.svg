<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="LLM Hunter">
  <defs>
    <linearGradient id="space" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070d"/>
      <stop offset="0.55" stop-color="#0a1320"/>
      <stop offset="1" stop-color="#0f0a1c"/>
    </linearGradient>
    <linearGradient id="title" gradientUnits="userSpaceOnUse" x1="346" y1="0" x2="841" y2="0">
      <stop offset="0" stop-color="#2de1c2"/>
      <stop offset="0.5" stop-color="#7cf6ff"/>
      <stop offset="1" stop-color="#b98cff"/>
    </linearGradient>
    <radialGradient id="planet" cx="0.35" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#8f7bff"/>
      <stop offset="0.6" stop-color="#4a3aa8"/>
      <stop offset="1" stop-color="#180f38"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
    <filter id="eyeglow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="pixglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.2" result="b"/>
      <feFlood flood-color="#2de1c2" flood-opacity="0.85" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- space -->
  <rect width="1200" height="360" fill="url(#space)"/>
  <ellipse cx="300" cy="300" rx="260" ry="120" fill="#137a6b" opacity="0.22" filter="url(#soft)"/>
  <ellipse cx="980" cy="70" rx="240" ry="140" fill="#5b3aa0" opacity="0.22" filter="url(#soft)"/>

  <!-- stars -->
  <g fill="#dbe8ff" shape-rendering="crispEdges">
    <rect x="60" y="40" width="2" height="2"/><rect x="140" y="90" width="2" height="2"/>
    <rect x="220" y="30" width="3" height="3"/><rect x="330" y="70" width="2" height="2"/>
    <rect x="500" y="40" width="2" height="2"/><rect x="620" y="80" width="3" height="3"/>
    <rect x="700" y="35" width="2" height="2"/><rect x="820" y="60" width="2" height="2"/>
    <rect x="900" y="30" width="2" height="2"/><rect x="1130" y="55" width="2" height="2"/>
    <rect x="40" y="180" width="2" height="2"/><rect x="120" y="250" width="3" height="3"/>
    <rect x="70" y="320" width="2" height="2"/><rect x="260" y="300" width="2" height="2"/>
    <rect x="470" y="300" width="2" height="2"/><rect x="560" y="330" width="3" height="3"/>
    <rect x="690" y="290" width="2" height="2"/><rect x="780" y="320" width="2" height="2"/>
    <rect x="880" y="280" width="2" height="2"/><rect x="1000" y="300" width="3" height="3"/>
    <rect x="1090" y="250" width="2" height="2"/><rect x="1150" y="320" width="2" height="2"/>
    <rect x="410" y="140" width="2" height="2"/><rect x="1060" y="180" width="2" height="2"/>
  </g>
  <g fill="#7cf6ff" shape-rendering="crispEdges">
    <rect x="180" y="150" width="3" height="3"/><rect x="540" y="120" width="3" height="3"/>
    <rect x="1010" y="230" width="3" height="3"/><rect x="360" y="330" width="3" height="3"/>
  </g>

  <!-- planet -->
  <circle cx="1055" cy="92" r="52" fill="url(#planet)"/>
  <ellipse cx="1055" cy="92" rx="86" ry="22" fill="none" stroke="#7cf6ff" stroke-opacity="0.55" stroke-width="3" transform="rotate(-22 1055 92)"/>
  <ellipse cx="1055" cy="92" rx="86" ry="22" fill="none" stroke="#b98cff" stroke-opacity="0.35" stroke-width="6" transform="rotate(-22 1055 92)"/>

  <!-- pixel hooded figure -->
  <g transform="translate(96,86)" shape-rendering="crispEdges">
    <g filter="url(#eyeglow)" fill="#9bfcff">
